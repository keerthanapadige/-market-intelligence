name: Data Pipeline

on:
  schedule:
    # Run every day at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allows you to run it manually from the "Actions" tab

jobs:
  run_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dbt-duckdb pyarrow

      - name: Extract Prices
        run: python src/fetch_prices.py

      - name: Run dbt Transformation
        run: |
          cd dbt_project
          dbt run --profiles-dir ..

      - name: Run dbt Tests
        run: |
          cd dbt_project
          dbt test --profiles-dir ..
